<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Tahoma,sans-serif;
}

body{
    background:
    linear-gradient(135deg,#34344a,#497b8f,#5d7b7b);
    min-height:100vh;
    color:#fff;
}

header{
    padding:20px;
    font-size:30px;
    font-weight:bold;
}

.player{
    position:sticky;
    top:0;
    z-index:100;
    backdrop-filter:blur(18px);
    background:rgba(255,255,255,.12);
    border-bottom:1px solid rgba(255,255,255,.15);
    padding:15px;
}

#nowPlaying{
    font-size:18px;
    margin-bottom:10px;
}

button{
    background:#00d084;
    border:none;
    color:#fff;
    padding:10px 18px;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
}

.grid{
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:18px;
}

.card{
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.12);
    border-radius:18px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s;
    backdrop-filter:blur(15px);
}

.card:hover{
    transform:translateY(-6px);
    background:rgba(255,255,255,.15);
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
    background:#fff;
}

.card h3{
    padding:12px;
    font-size:16px;
    text-align:center;
    min-height:70px;
}

.active{
    border:2px solid #00ff9d;
    box-shadow:0 0 20px #00ff9d55;
}
</style>

</head>

const audio=document.getElementById("audio");
const list=document.getElementById("stations");

stations.forEach((s)=>{

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${s.logo}">
<h3>${s.name}</h3>
`;

card.onclick=()=>{

document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
card.classList.add("active");

audio.src=s.url;
audio.play();

document.getElementById("nowPlaying").innerHTML="🎵 กำลังเล่น : "+s.name;

};

list.appendChild(card);

});

function toggle(){

if(audio.paused)
audio.play();
else
audio.pause();

}
